version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: jobcrab-db
    environment:
      POSTGRES_DB: jobcrab
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d jobcrab"]
      interval: 5s
      timeout: 5s
      retries: 5

  python-service:
    build: ./python-service
    container_name: jobcrab-scraper
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://dev:devpassword@postgres:5432/jobcrab
      FIRECRAWL_API_KEY: ${FIRECRAWL_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      FRONTEND_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
